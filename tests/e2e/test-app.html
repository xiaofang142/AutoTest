<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>AutoTest 演示商城</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f2f5; }
  .app { width: 420px; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); overflow: hidden; }
  .header { background: #1a73e8; color: white; padding: 20px; text-align: center; }
  .header h1 { font-size: 20px; }
  .content { padding: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 4px; }
  .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
  .form-group input:focus { border-color: #1a73e8; }
  .btn { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
  .btn:hover { background: #1557b0; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .error { background: #fef2f2; color: #dc2626; padding: 12px; border-radius: 6px; margin-top: 12px; display: none; }
  .error.show { display: block; }
  .success { background: #f0fdf4; color: #16a34a; padding: 12px; border-radius: 6px; margin-top: 12px; display: none; }
  .success.show { display: block; }
  .product-list { margin-top: 16px; }
  .product { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
  .product:last-child { border-bottom: none; }
  .product-name { font-weight: 500; }
  .product-price { color: #1a73e8; font-weight: 600; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header"><h1>🛒 AutoTest 演示商城</h1></div>
  <div class="content">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="输入用户名" value="demo">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="输入密码" value="demo123">
    </div>
    <button class="btn" id="loginBtn" onclick="handleLogin()">登录</button>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
    <div class="product-list" id="productList" style="display:none">
      <h3>商品列表</h3>
      <div class="product"><span class="product-name">AI 鼠标</span><span class="product-price">¥299</span></div>
      <div class="product"><span class="product-name">机械键盘</span><span class="product-price">¥599</span></div>
      <div class="product"><span class="product-name">4K 显示器</span><span class="product-price">¥2,999</span></div>
    </div>
  </div>
</div>
<script>
function handleLogin() {
  const user = document.getElementById('username').value.trim();
  const pwd = document.getElementById('password').value.trim();
  const err = document.getElementById('errorMsg');
  const suc = document.getElementById('successMsg');
  const plist = document.getElementById('productList');
  err.classList.remove('show');
  suc.classList.remove('show');
  plist.style.display = 'none';

  if (!user || !pwd) {
    err.textContent = '用户名和密码不能为空';
    err.classList.add('show');
    return;
  }
  if (pwd.length < 6) {
    err.textContent = '密码长度不能少于6位';
    err.classList.add('show');
    return;
  }
  // Simulate API call that returns 500 for certain conditions
  if (user === 'error') {
    err.textContent = '系统错误，请稍后重试 (code: INT-500)';
    err.classList.add('show');
    return;
  }
  suc.textContent = '登录成功！欢迎 ' + user;
  suc.classList.add('show');
  plist.style.display = 'block';
}
</script>
</body>
</html>
